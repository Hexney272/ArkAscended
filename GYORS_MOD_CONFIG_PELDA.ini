; ==========================================
; GYORS MOD KONFIGURÁCIÓS PÉLDÁK
; ARK: Survival Ascended
; Másold be ezeket a Game.ini-be vagy GameUserSettings.ini-be
; ==========================================

; === GAME.INI PÉLDÁK ===

; -----------------------------------------------
; WBUI2 - UI Overlay
; -----------------------------------------------
[WBUI2]
JsonURL=https://your-website.com/wbui2-config.json

; -----------------------------------------------
; Seed Farm: Grow Everything
; -----------------------------------------------
[SeedFarm]
GrowthSpeedMultiplier=5.0
HarvestMultiplier=10.0
RequiresWater=true
FertilizerEffectiveness=2.0

; -----------------------------------------------
; SmartTurrets
; -----------------------------------------------
[SmartTurrets]
RangeMultiplier=2.0
DamageMultiplier=1.5
AmmoConsumptionMultiplier=0.5
AutoTargetWildDinos=true
AutoTargetPlayers=false
AutoTargetTamedDinos=false

; -----------------------------------------------
; Utilities Plus
; -----------------------------------------------
[UtilitiesPlus]
ItemPickupRange=500.0
EnableAutoPickup=true
StackSizeMultiplier=10.0

; -----------------------------------------------
; Awesome Spyglass
; -----------------------------------------------
[AwesomeSpyglass]
ViewDistance=5000.0
ShowStats=true
ShowWildLevel=true
ShowTamedLevel=true
ShowBreedingInfo=true
UseColorCoding=true

; -----------------------------------------------
; New Dino Cloner
; -----------------------------------------------
[NewDinoCloner]
CloningTime=3600
CostMultiplier=1.0
ElementCost=100
UseElementInsteadOfShards=false

; -----------------------------------------------
; Awesome ARK Tools
; -----------------------------------------------
[AwesomeArkTools]
BuildingRange=500.0
SnapDistance=50.0
DisableCollisionCheck=false

; -----------------------------------------------
; Automated Ark
; -----------------------------------------------
[AutomatedArk]
EnableAutoFeeding=true
EnableAutoBreeding=true
FeedingRange=50.0
BreedingCheckInterval=300

; -----------------------------------------------
; Dino Painter
; -----------------------------------------------
[DinoPainter]
PaintCost=1
SprayDistance=10.0
AvailableColors=256

; -----------------------------------------------
; Pelayori's Cryo Storage
; -----------------------------------------------
[PelayoriCryoStorage]
StorageLimit=500
DisableCryoSickness=true
DecayTime=0

; -----------------------------------------------
; Ark Primal Chaos
; -----------------------------------------------
[ArkPrimalChaos]
CustomSpawnRate=1.5
LootQualityMultiplier=2.0

; -----------------------------------------------
; Ark Descended
; -----------------------------------------------
[ArkDescended]
AutoUnlockEngrams=true
CraftCostMultiplier=0.5

; -----------------------------------------------
; Spawn Blocker
; -----------------------------------------------
[SpawnBlocker]
BlockRadius=100.0
BlockFlyers=true
BlockGroundDinos=true

; -----------------------------------------------
; Automated Dino Wipes
; -----------------------------------------------
[AutomatedDinoWipes]
WipeInterval=24
WipeTime=03:00
NotifyAdmins=true

; -----------------------------------------------
; Alfa Oceanic Platforms
; -----------------------------------------------
[AlfaOceanicPlatforms]
MaxPlatformSize=50x50
MaxStructuresOnPlatform=500
AllowCollision=false

; ==========================================
; === GAMEUSERSETTINGS.INI PÉLDÁK ===
; ==========================================

[ServerSettings]

; -----------------------------------------------
; Crossplay Beállítások (GameServerApp.com)
; -----------------------------------------------
crossplay-enable-pc=true
crossplay-enable-wingdk=true
crossplay-enable-xsx=true
crossplay-enable-ps5=true

; -----------------------------------------------
; Crop Growing (Seed Farm kompatibilis)
; -----------------------------------------------
CropGrowthSpeedMultiplier=20.0
CropDecaySpeedMultiplier=0.2

; -----------------------------------------------
; Cryopod Beállítások
; -----------------------------------------------
bEnableCryoSicknessPVE=False
bEnableCryopodNerf=False
CryopodNerfDuration=0
CryopodNerfDamageMult=1.0
CryopodNerfIncomingDamageMultPercent=1.0

; -----------------------------------------------
; Egyéb Hasznos Beállítások
; -----------------------------------------------
bAllowUnlimitedRespec=True
AllowStructurePickup=True
StructurePickupTimeAfterPlacement=30.0
StructurePickupHoldDuration=0.5
bAllowFlyingStaminaRecovery=True
PvEAllowStructuresAtSupplyDrops=True

; -----------------------------------------------
; Custom Recipe Hatékonyság
; -----------------------------------------------
CustomRecipeEffectivenessMultiplier=5.0
CustomRecipeSkillMultiplier=5.0

; -----------------------------------------------
; Supply Crate és Fishing Loot
; -----------------------------------------------
SupplyCrateLootQualityMultiplier=5.0
FishingLootQualityMultiplier=5.0

; -----------------------------------------------
; Hair Növekedés
; -----------------------------------------------
HairGrowthSpeedMultiplier=5.0

; -----------------------------------------------
; Tribe Limitek
; -----------------------------------------------
MaxNumbersofPlayersInTribe=10
MaxTribeStructures=50000

; -----------------------------------------------
; Turret Limitek
; -----------------------------------------------
MaxNumberOfTurretsInRange=200
LimitTurretsRange=15000

; -----------------------------------------------
; Platform Saddle Limit
; -----------------------------------------------
MaxPlatformSaddleStructureLimit=500

