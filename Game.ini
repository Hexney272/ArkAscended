; -----------------------------------------------
; CUSTOM DINO LEVELS MOD - Dino Level Eloszlás
; -----------------------------------------------
; Ez a mod megváltoztatja a wild dino level eloszlást
; FONTOS: Csak EGY boolean lehet TRUE egyszerre!

[CustomDinoLevels]
; === LEVEL ELOSZLÁS TÍPUSOK (Csak 1 lehet TRUE!) ===

; Vanilla eloszlás (alapértelmezett ARK)
bUseVanillaLevels=false

; Ragnarok-stílusú eloszlás (több high-level dino)
bUseRagnarokLevels=true

; Egyenletes eloszlás (minden level egyforma eséllyel)
bUseEqualizedLevels=false

; Magas szintek felé tolva (több high-level, kevesebb low-level)
bUseHighEndSkew=false

; === MEGJEGYZÉS ===
; VANILLA DINÓK: 5-150 level (Ragnarok eloszlás - több high-level)
; MOD DINÓK (Primal Chaos, Descended): 400-600 level (ConfigOverride alatt beállítva)
; TAMED MAX: ~900 level (150 wild + 73 bonus + 677 level-up)

; -----------------------------------------------
; PRIMAL CHAOS & ARK DESCENDED - MOD DINO LEVEL OVERRIDE
; -----------------------------------------------
; Ezek a beállítások 400-600 közötti szintre állítják a mod dinókat
; FIGYELEM: A Custom Dino Levels mod NEM befolyásolja ezeket!
; Ezek külön spawn override-ok, amelyek felülírják a mod dinók szintjét

[/Script/ShooterGame.ShooterGameMode]

