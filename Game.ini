; === ENGRAM FELOLDÁSOK OPTIMALIZÁLÁSA ===
; Minden játékos minden engram-ot feloldhat
; Ezek a beállítások a GameUserSettings.ini-ben vannak, nem itt

; === DINO SPAWN SÚLYOZÁS ===
; Ritka dinók gyakoribb spawn-olása
ConfigAddNPCSpawnEntriesContainer=(NPCSpawnEntriesContainerClassString="DinoSpawnEntriesRagnarok_C",NPCSpawnEntries=((AnEntryName="Rex",EntryWeight=0.2)),NPCSpawnLimits=((NPCClassString="Rex_Character_BP_C",MaxPercentageOfDesiredNumToAllow=0.2)))

; === DLC LÉNYEK HOZZÁADÁSA (Opcionális) ===
; FIGYELEM: A DLC-ket meg kell vásárolnod, hogy használhasd őket!
; AJÁNLOTT: Használj "DLC Spawns" modot a CurseForge-ról helyette!
; Ez egyszerűbb és automatikusan kezeli az összes DLC lény spawn-olását.
;
; Ha manuálisan szeretnéd beállítani, uncommenteld az alábbi sorokat.
; Egyelőre kikommentelve, mert instabil lehet Nitrado szervereken.

; === HARVESTING OPTIMALIZÁCIÓ ===
