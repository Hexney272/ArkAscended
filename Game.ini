; === LEVEL SZÁMÍTÁS MAGYARÁZAT ===
; MinLevel=13.33 → 13.33 * 30 = ~400 level
; MaxLevel=20.0 → 20.0 * 30 = 600 level
; 
; EntryWeight: Spawn esély súlya (0.01 = nagyon ritka, 0.1 = ritka, 1.0 = gyakori)
; NPCsToSpawnPercentageChance: Spawn valószínűség százalékban
; MaxPercentageOfDesiredNumToAllow: Max populáció százalék
;
; FIGYELEM: Ezek PÉLDÁK! A pontos class stringeket (BP_C) a modok dokumentációjából kell venni!
; Ha nem működnek, ellenőrizd a mod által használt pontos Blueprint neveket!

; -----------------------------------------------
; ARK DESCENDED MOD BEÁLLÍTÁSOK
; -----------------------------------------------

; -----------------------------------------------
; ARK DESCENDED MOD BEÁLLÍTÁSOK
; -----------------------------------------------
[ArkDescended]
PickHarvestRate=5
HatchetHarvestRate=5
RocketSingularity=True
GalaxySingularitySmall=True
GalaxySingularityLarge=True
DragonSingularity=False
BossBattleMusic=False
EternalSwordInfiniteHealth=True
WarGenUnbreakable=True
TekShieldHealthMulti=1
LARexGravityRoar=True
EnableUltimateMinions=True

; -----------------------------------------------
; INVENTORY BACKUP SAVER (928597) - Death Recovery
; -----------------------------------------------
; Ez a mod halál esetén elmenti a játékos inventory-ját
; Admin parancs a visszaállításhoz: cheat scriptcommand restore <PlayerName>
; Automatikus backup minden halálnál: cheat scriptcommand backupall
[InventoryBackupSaver]
; Automatikus backup engedélyezése halálkor
AutoBackupOnDeath=true

; Backup tárolási idő (napokban) - 0 = végtelen
BackupRetentionDays=7

; Backup limit játékosonként
MaxBackupsPerPlayer=10

; Admin értesítés halálkor
NotifyAdminsOnDeath=true

; Automatikus restore (ha true, automatikusan visszaadja az itemeket respawn-nál)
; FIGYELEM: Ez kikapcsolja a PvE halálbüntetést!
AutoRestoreOnRespawn=false

; Backup mentési hely
BackupFolder=SaveGames/InventoryBackups

; Log fájl írása
EnableLogging=true

; === ÚJRAÉLEDÉSI IDŐK ===
; Player respawn intervallum
RespawnInterval=1.0
RespawnIntervalCheckPeriod=30.0

; === STRUKTURA PICKUP ===
; Építmények felvétele időkorlát nélkül
AllowStructurePickup=True
StructurePickupTimeAfterPlacement=30.0
StructurePickupHoldDuration=0.5

; === CAVE FLYER ===
; Repülés a barlangokban (hasznos lehet bizonyos módokkal)
bAllowFlyingStaminaRecovery=True

; === RAGNAROK SPECIFIKUS ===
; Térkép-specifikus spawn beállítások
TheMaxStructuresInRange=10500

; === ANTI-MESH VÉDELEM ===
; Anti-mesh rendszer (Nitrado automatikusan kezeli)
bGenesisUseStructuresPreventionVolumes=True

; === TELEMETRY ÉS STATISZTIKÁK ===
bDisableStructurePlacementCollision=False

; === EGYÉB HASZNOS BEÁLLÍTÁSOK ===
bAllowUnlimitedRespec=True
bPassiveDefensesDamageRiderlessDinos=False
PvEAllowStructuresAtSupplyDrops=True
bIncreasePvPRespawnInterval=False
bAutoPvETimer=False
bAutoPvEUseSystemTime=False

