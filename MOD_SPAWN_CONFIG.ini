; LEVEL SZÁMÍTÁS MAGYARÁZAT
; ========================================
; OverrideOfficialDifficulty=5.0 → Max wild level 150
; Szorzó: 30 (150 / 5 = 30)
;
; Alpha tier (80-150):  MinLevel=2.67 (80/30),  MaxLevel=5.0 (150/30)
; Beta tier (150-220):  MinLevel=5.0 (150/30),  MaxLevel=7.33 (220/30)
; Gamma tier (220-300): MinLevel=7.33 (220/30), MaxLevel=10.0 (300/30)
; Delta tier (300-380): MinLevel=10.0 (300/30), MaxLevel=12.67 (380/30)
; Epsilon tier (380-460): MinLevel=12.67 (380/30), MaxLevel=15.33 (460/30)
; Toxic tier (460-550): MinLevel=15.33 (460/30), MaxLevel=18.33 (550/30)
; Celestial tier (550-750): MinLevel=18.33 (550/30), MaxLevel=25.0 (750/30)
;
; Ark Descended Ordinary (150-300): MinLevel=5.0, MaxLevel=10.0
; Ark Descended Descended (400-550): MinLevel=13.33, MaxLevel=18.33
; Ark Descended Celestial (600-850): MinLevel=20.0, MaxLevel=28.33
